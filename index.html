<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
:root{
    --bg:#07090d;
    --card:rgba(255,255,255,.04);
    --border:rgba(255,255,255,.08);
    --accent:#2f6bff;
    --text:#ffffff;
    --muted:#a6afc2;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.bg-orb{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:.6;
    animation:float 12s ease-in-out infinite;
}

.orb-1{
    width:320px;
    height:320px;
    background:#1d4ed8;
    top:-120px;
    left:-100px;
}

.orb-2{
    width:420px;
    height:420px;
    background:#2563eb;
    right:-150px;
    bottom:-150px;
    animation-delay:2s;
}

@keyframes float{
    50%{
        transform:translateY(-25px) translateX(20px);
    }
}

#loader{
    position:fixed;
    inset:0;
    background:#07090d;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:20px;
    z-index:999;
    transition:.6s ease;
}

.loader-bar{
    width:220px;
    height:4px;
    background:rgba(255,255,255,.08);
    overflow:hidden;
    border-radius:999px;
}

.loader-bar span{
    display:block;
    width:40%;
    height:100%;
    background:var(--accent);
    animation:load 1.2s linear infinite;
}

@keyframes load{
    from{transform:translateX(-100%);}
    to{transform:translateX(550%);}
}

.wrapper{
    width:min(92%,700px);
    opacity:0;
    transform:translateY(20px);
    transition:1s ease;
}

.wrapper.show{
    opacity:1;
    transform:translateY(0);
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter:blur(18px);
    border-radius:28px;
    padding:48px 32px;
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:28px;
}

.title{
    font-size:clamp(2rem,5vw,3rem);
    font-weight:800;
    letter-spacing:-1px;
    margin-bottom:14px;
}

.subtitle{
    color:var(--muted);
    line-height:1.7;
    max-width:520px;
    margin:auto;
}

.status{
    display:inline-flex;
    align-items:center;
    gap:10px;
    margin-top:30px;
    padding:12px 18px;
    border-radius:999px;
    border:1px solid rgba(47,107,255,.25);
    background:rgba(47,107,255,.08);
    color:#7ea5ff;
    font-size:.92rem;
    font-weight:600;
}

.status img{
    width:18px;
    height:18px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#3b82f6;
    box-shadow:0 0 14px #3b82f6;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.4);
    }
}

.footer{
    margin-top:22px;
    color:#7d8698;
    font-size:.9rem;
}

@media(max-width:600px){
    .card{
        padding:36px 22px;
    }

    .logo{
        width:95px;
        height:95px;
    }

    .status{
        font-size:.82rem;
    }
}
</style></head><body><div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div><div id="loader">
    <img src="assets/logo.png" alt="Logo" width="70">
    <div class="loader-bar">
        <span></span>
    </div>
</div><div class="wrapper" id="content">
    <div class="card">    <img src="assets/logo.png" alt="Logo" class="logo">

    <h1 class="title">The Stage Is Set</h1>

    <p class="subtitle">
        We're currently working behind the scenes to improve the experience. Working on Indian Esports Eco-System.
    </p>

    <div class="status">
        <div class="dot"></div>
        <img src="https://img.icons8.com/fluency/48/maintenance.png" alt="">
        Website Under Maintenance
    </div>

    <div class="footer">
        Persian Esports • All rights reserved
    </div>

</div>

</div><script>
window.addEventListener("load", () => {
    const loader = document.getElementById("loader");
    const content = document.getElementById("content");

    setTimeout(() => {
        loader.style.opacity = "0";
        loader.style.pointerEvents = "none";

        setTimeout(() => {
            loader.style.display = "none";
            content.classList.add("show");
        }, 600);
    }, 1400);
});
</script></body>
</html>
