<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | Esports Organization</title>
    <style>
        /* Base Reset & Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0c10;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Deep Blue Gradient Textures */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(60px);
            z-index: 0;
        }

        body::before {
            width: 400px;
            height: 400px;
            top: -10%;
            left: -10%;
        }

        body::after {
            width: 500px;
            height: 500px;
            bottom: -15%;
            right: -10%;
        }

        /* Container */
        .container {
            text-align: center;
            z-index: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. Loading Interface */
        #loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 102, 255, 0.1);
            border-radius: 50%;
            border-top-color: #0066ff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 2. Main Content (Hidden initially, revealed after load) */
        .main-content {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease 0.2s, transform 1s ease 0.2s;
        }

        .main-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Logo Placeholder */
        .logo-container {
            margin-bottom: 30px;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Temporary border to show the space, remove once logo is added */
            border: 2px dashed rgba(255, 255, 255, 0.1); 
            border-radius: 12px;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Animated Text (Word by Word) */
        .headline {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(10px);
            filter: blur(4px);
            animation: fadeInUp 0.6s forwards;
        }

        /* Staggered animation delays for "The stage is set" */
        .word:nth-child(1) { animation-delay: 0.8s; }
        .word:nth-child(2) { animation-delay: 1.2s; }
        .word:nth-child(3) { animation-delay: 1.6s; }
        .word:nth-child(4) { animation-delay: 2.0s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* Maintenance Status */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.2);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #3385ff;
            text-transform: uppercase;
            margin-top: 10px;
            opacity: 0;
            animation: fadeIn 1s forwards 2.5s;
        }

        .status-badge img {
            width: 16px;
            height: 16px;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="main-content" id="main-content">
            
            <div class="logo-container">
                <span style="color: rgba(255,255,255,0.4); font-size: 0.8rem;">[ PLACE LOGO HERE ]</span>
            </div>

            <h1 class="headline">
                <span class="word">The</span>
                <span class="word">stage</span>
                <span class="word">is</span>
                <span class="word">set</span>
            </h1>

            <div class="status-badge">
                <img src="https://img.icons8.com/fluency/48/maintenance.png" alt="Wrench Icon"/>
                Website under maintenance
            </div>

        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader-screen');
            const content = document.getElementById('main-content');
            
            // Simulates a short professional delay for the loader before fading out
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                content.classList.add('visible');
            }, 1000); 
        });
    </script>
</body>
</html>
